<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交订单 · 二手盲盒平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="top-bar">
    <div class="site-name">🎁 二次惊喜 · <span>二手盲盒平台</span></div>
    <div class="top-right">
        <a href="login.html" id="loginOrProfileLink" class="login-link">🔐 登录/注册</a>
        <a href="cart.html" class="cart-icon-link" id="cartLink">🛒 购物车</a>
        <div class="student-info">👩‍🎓 李镕妍 | 学号：24215220110 | 24网络1班</div>
    </div>
</div>

<div class="container">
    <div class="order-header">
        <h2>📝 提交订单</h2>
        <span class="order-step">确认订单信息</span>
    </div>

    <!-- 收货地址 -->
    <div class="address-section">
        <h3>收货地址</h3>
        <div class="address-card" id="addressCard">
            <div class="address-info" id="addressInfo">
                <p class="address-default-text">请填写收货地址</p>
            </div>
            <button class="edit-address-btn" id="editAddressBtn">📝 编辑地址</button>
        </div>
    </div>

    <!-- 商品列表 -->
    <div class="order-products-section">
        <h3>订单商品</h3>
        <div id="orderProductsList" class="order-products-list">
            <div class="loading">加载订单商品中...</div>
        </div>
    </div>

    <!-- 订单金额 -->
    <div class="order-amount-section">
        <div class="amount-item">
            <span>商品总金额</span>
            <span>¥<span id="productTotal">0</span></span>
        </div>
        <div class="amount-item">
            <span>运费</span>
            <span>¥<span id="freight">0</span></span>
        </div>
        <div class="amount-item total">
            <span>实付金额</span>
            <span class="total-price">¥<span id="finalTotal">0</span></span>
        </div>
    </div>

    <!-- 支付方式 -->
    <div class="payment-section">
        <h3>支付方式</h3>
        <div class="payment-options">
            <label class="payment-option">
                <input type="radio" name="payment" value="wechat" checked>
                <span>📱 微信支付</span>
            </label>
            <label class="payment-option">
                <input type="radio" name="payment" value="alipay">
                <span>💰 支付宝</span>
            </label>
            <label class="payment-option">
                <input type="radio" name="payment" value="card">
                <span>💳 银行卡</span>
            </label>
        </div>
    </div>

    <!-- 提交按钮 -->
    <div class="order-actions">
        <button class="back-cart-btn" id="backCartBtn">返回购物车</button>
        <button class="submit-order-btn" id="submitOrderBtn">提交订单</button>
    </div>
</div>

<footer>
    © 二次惊喜 · 二手盲盒交易 | 真实捡漏 欧气传递
</footer>

<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script src="js/order.js"></script>
<script src="js/main.js"></script>
</body>
</html>
