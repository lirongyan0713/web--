<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 · 二手盲盒平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="top-bar">
    <div class="site-name">🎁 二次惊喜 · <span>二手盲盒平台</span></div>
    <div class="student-info">👩‍🎓 李镕妍 | 学号：24215220110 | 24网络1班</div>
</div>

<div class="auth-container">
    <div class="auth-card">
        <!-- 选项卡 -->
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">登录</button>
            <button class="auth-tab" data-tab="register">注册</button>
        </div>

        <!-- 登录表单 -->
        <div id="loginForm" class="auth-form active">
            <h3>欢迎回来 👋</h3>
            <div class="input-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名">
            </div>
            <div class="input-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码">
            </div>
            <button id="doLoginBtn" class="auth-btn">登 录</button>
            <div class="auth-tip" id="loginTip"></div>
        </div>

        <!-- 注册表单 -->
        <div id="registerForm" class="auth-form">
            <h3>创建新账号 ✨</h3>
            <div class="input-group">
                <label>用户名</label>
                <input type="text" id="regUsername" placeholder="3~12位字母/数字">
            </div>
            <div class="input-group">
                <label>邮箱</label>
                <input type="email" id="regEmail" placeholder="用于找回密码">
            </div>
            <div class="input-group">
                <label>密码</label>
                <input type="password" id="regPassword" placeholder="至少6位">
            </div>
            <div class="input-group">
                <label>确认密码</label>
                <input type="password" id="regConfirmPwd" placeholder="再次输入密码">
            </div>
            <button id="doRegisterBtn" class="auth-btn">注 册</button>
            <div class="auth-tip" id="registerTip"></div>
        </div>
    </div>
</div>

<footer>
    © 二次惊喜 · 二手盲盒交易 | 登录即表示同意《用户协议》
</footer>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
